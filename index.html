<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Vibe Site</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      min-height: 100%;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #312e81 100%);
      background-attachment: fixed;
      color: #f8fafc;
      text-align: center;
      overflow-x: hidden;
    }

    .particles {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      transition: transform 0.8s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      filter: blur(40px);
      opacity: 0;
      animation: float ease-in-out infinite;
    }

    .particle:nth-child(1) {
      width: 280px; height: 280px;
      background: radial-gradient(circle, rgba(167, 100, 255, 0.45) 0%, transparent 70%);
      top: 8%; left: 12%;
      animation-duration: 14s;
      animation-delay: 0s;
    }
    .particle:nth-child(2) {
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(80, 220, 255, 0.40) 0%, transparent 70%);
      top: 65%; left: 8%;
      animation-duration: 18s;
      animation-delay: 2s;
    }
    .particle:nth-child(3) {
      width: 240px; height: 240px;
      background: radial-gradient(circle, rgba(255, 130, 200, 0.40) 0%, transparent 70%);
      top: 20%; right: 10%;
      animation-duration: 16s;
      animation-delay: 4s;
    }
    .particle:nth-child(4) {
      width: 180px; height: 180px;
      background: radial-gradient(circle, rgba(167, 100, 255, 0.38) 0%, transparent 70%);
      top: 75%; right: 15%;
      animation-duration: 12s;
      animation-delay: 1s;
    }
    .particle:nth-child(5) {
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(80, 220, 255, 0.35) 0%, transparent 70%);
      top: 45%; left: 25%;
      animation-duration: 20s;
      animation-delay: 3s;
    }
    .particle:nth-child(6) {
      width: 160px; height: 160px;
      background: radial-gradient(circle, rgba(255, 130, 200, 0.42) 0%, transparent 70%);
      top: 5%; left: 55%;
      animation-duration: 15s;
      animation-delay: 5s;
    }
    .particle:nth-child(7) {
      width: 220px; height: 220px;
      background: radial-gradient(circle, rgba(167, 100, 255, 0.40) 0%, transparent 70%);
      top: 55%; right: 25%;
      animation-duration: 17s;
      animation-delay: 6s;
    }
    .particle:nth-child(8) {
      width: 190px; height: 190px;
      background: radial-gradient(circle, rgba(80, 220, 255, 0.42) 0%, transparent 70%);
      top: 30%; left: 5%;
      animation-duration: 13s;
      animation-delay: 2.5s;
    }
    .particle:nth-child(9) {
      width: 260px; height: 260px;
      background: radial-gradient(circle, rgba(255, 130, 200, 0.35) 0%, transparent 70%);
      top: 85%; left: 45%;
      animation-duration: 19s;
      animation-delay: 1.5s;
    }
    .particle:nth-child(10) {
      width: 170px; height: 170px;
      background: radial-gradient(circle, rgba(167, 100, 255, 0.38) 0%, transparent 70%);
      top: 40%; right: 5%;
      animation-duration: 14s;
      animation-delay: 4.5s;
    }
    .particle:nth-child(11) {
      width: 230px; height: 230px;
      background: radial-gradient(circle, rgba(80, 220, 255, 0.32) 0%, transparent 70%);
      top: 15%; left: 35%;
      animation-duration: 16s;
      animation-delay: 3.5s;
    }
    .particle:nth-child(12) {
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(255, 130, 200, 0.38) 0%, transparent 70%);
      top: 60%; left: 60%;
      animation-duration: 18s;
      animation-delay: 0.5s;
    }

    @keyframes float {
      0%, 100% {
        opacity: 0;
        transform: translateY(0) scale(1);
      }
      20% {
        opacity: 1;
      }
      50% {
        transform: translateY(-30px) scale(1.05);
      }
      80% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translateY(0) scale(1);
      }
    }

    .hero {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      max-width: 800px;
      padding: 2rem;
    }

    h1 {
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 1rem;
      background: linear-gradient(90deg, #e2e8f0 0%, #c7d2fe 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      opacity: 0;
      transform: translateY(30px);
      animation: fadeInUp 1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .hero-subtitle {
      font-size: clamp(1rem, 2.5vw, 1.35rem);
      font-weight: 400;
      color: #94a3b8;
      line-height: 1.6;
      max-width: 600px;
      margin: 0 auto;
      opacity: 1;
      transform: none;
      min-height: 1.6em;
    }

    .cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: #94a3b8;
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .skills {
      position: relative;
      z-index: 1;
      padding: 100px 2rem 120px;
    }

    .skills h2 {
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 800;
      color: #f8fafc;
      margin-bottom: 1rem;
      letter-spacing: -0.02em;
    }

    .skills-divider {
      width: 60px;
      height: 3px;
      margin: 0 auto 3.5rem;
      border-radius: 2px;
      background: linear-gradient(90deg, #a764ff, #50dcff, #ff82c8);
    }

    .skills-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      max-width: 800px;
      margin: 0 auto;
    }

    .skill-card {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--accent);
      border-radius: 16px;
      padding: 2rem 1rem;
      font-size: 1.1rem;
      font-weight: 600;
      color: #f8fafc;
      transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
      cursor: default;
    }

    .skill-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.3), 0 0 24px var(--accent-glow);
      background: rgba(255, 255, 255, 0.07);
    }

    .projects {
      position: relative;
      z-index: 1;
      padding: 0 2rem 120px;
    }

    .projects h2 {
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 800;
      color: #f8fafc;
      margin-bottom: 1rem;
      letter-spacing: -0.02em;
    }

    .projects-divider {
      width: 60px;
      height: 3px;
      margin: 0 auto 3.5rem;
      border-radius: 2px;
      background: linear-gradient(90deg, #a764ff, #50dcff, #ff82c8);
    }

    .projects-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      max-width: 900px;
      margin: 0 auto;
    }

    .project-card {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      overflow: hidden;
      text-align: left;
      transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
      cursor: default;
    }

    .project-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.3);
      background: rgba(255, 255, 255, 0.07);
    }

    .project-card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      display: block;
    }

    .project-card .project-info {
      padding: 1.25rem 1.5rem 1.5rem;
    }

    .project-card h3 {
      font-size: 1.15rem;
      font-weight: 700;
      color: #f8fafc;
      margin-bottom: 0.5rem;
    }

    .project-card p {
      font-size: 0.95rem;
      font-weight: 400;
      color: #94a3b8;
      line-height: 1.5;
      margin: 0;
      opacity: 1;
      transform: none;
      animation: none;
    }

    .nav-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 10;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 12px;
      padding: 0.9rem 1.6rem;
      font-size: 1.15rem;
      font-weight: 700;
      color: #f8fafc;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      animation: nav-pulse 2s ease-in-out infinite;
    }

    @keyframes nav-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(167, 100, 255, 0.4); }
      50% { box-shadow: 0 0 0 12px rgba(167, 100, 255, 0); }
    }

    .nav-btn:hover {
      background: rgba(255, 255, 255, 0.15);
      transform: translateY(-2px) scale(1.05);
    }

    .danmaku {
      position: fixed;
      z-index: 10;
      white-space: nowrap;
      font-weight: 700;
      color: #c7d2fe;
      text-shadow: 0 0 10px rgba(167, 100, 255, 0.7), 0 0 20px rgba(167, 100, 255, 0.4);
      pointer-events: none;
      animation: danmaku-fly 2.5s linear forwards;
    }

    @keyframes danmaku-fly {
      0% { transform: translateX(0); opacity: 0; }
      8% { opacity: 1; }
      85% { opacity: 1; }
      100% { transform: translateX(var(--fly-distance)); opacity: 0; }
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0, 0, 0, 0.6);
      display: none;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .modal-overlay.active {
      display: flex;
      opacity: 1;
    }

    .modal-img {
      max-width: 50vw;
      max-height: 50vh;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      transform: scale(0.9);
      transition: transform 0.3s ease;
    }

    .modal-overlay.active .modal-img {
      transform: scale(1);
    }

    .spotlight-overlay {
      position: fixed;
      inset: 0;
      z-index: 90;
      background: rgba(0, 0, 0, 0.88);
      display: none;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .spotlight-overlay.active {
      display: flex;
      opacity: 1;
    }

    .magnifier-glass {
      width: 300px;
      height: 300px;
      border-radius: 50%;
      position: relative;
      overflow: hidden;
      border: 5px solid rgba(255, 255, 255, 0.25);
      box-shadow:
        0 0 0 3px rgba(255, 255, 255, 0.08),
        0 0 60px rgba(167, 100, 255, 0.3),
        0 0 120px rgba(167, 100, 255, 0.1),
        inset 0 0 40px rgba(255, 255, 255, 0.08);
      transform: scale(0);
      transition: transform 3s cubic-bezier(0.22, 1, 0.36, 1);
      background: rgba(15, 23, 42, 0.6);
    }

    .spotlight-overlay.active .magnifier-glass {
      transform: scale(1);
    }

    .magnifier-glass::before {
      content: '';
      position: absolute;
      top: 8%;
      left: 12%;
      width: 45%;
      height: 28%;
      background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent 60%);
      border-radius: 50%;
      z-index: 2;
      pointer-events: none;
    }

    .magnifier-content {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      transform: scale(1.35);
    }

    .magnifier-content .contact-item {
      font-size: 1.2rem;
      color: #f8fafc;
    }

    .ktv-overlay {
      position: fixed;
      inset: 0;
      z-index: 99;
      pointer-events: none;
      mix-blend-mode: overlay;
      opacity: 0;
      transition: opacity 0.5s ease;
      animation: ktv-flash 0.3s infinite;
    }

    .ktv-overlay.active {
      opacity: 0.25;
    }

    @keyframes ktv-flash {
      0% { background: rgba(255, 0, 0, 0.3); }
      20% { background: rgba(0, 255, 0, 0.3); }
      40% { background: rgba(0, 0, 255, 0.3); }
      60% { background: rgba(255, 0, 255, 0.3); }
      80% { background: rgba(255, 255, 0, 0.3); }
      100% { background: rgba(0, 255, 255, 0.3); }
    }

    .contact {
      position: relative;
      z-index: 1;
      padding: 0 2rem 120px;
    }

    .contact h2 {
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 800;
      color: #f8fafc;
      margin-bottom: 1rem;
      letter-spacing: -0.02em;
    }

    .contact-divider {
      width: 60px;
      height: 3px;
      margin: 0 auto 3rem;
      border-radius: 2px;
      background: linear-gradient(90deg, #a764ff, #50dcff, #ff82c8);
    }

    .contact-card {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 2rem 2.5rem;
      max-width: 420px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .contact-item {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      font-size: 1.05rem;
      color: #e2e8f0;
    }

    .contact-item .icon {
      font-size: 1.25rem;
      line-height: 1;
    }

    footer {
      position: relative;
      z-index: 1;
      padding: 0 2rem 2.5rem;
      text-align: center;
    }

    footer p {
      font-size: 0.85rem;
      color: #64748b;
      opacity: 1;
      transform: none;
      animation: none;
      margin: 0;
    }

    @media (max-width: 768px) {
      .skills-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      .projects-grid {
        grid-template-columns: 1fr;
        max-width: 400px;
      }
    }
  </style>
</head>
<body>
  <a class="nav-btn" id="navBtn">同城代打</a>

  <div class="particles" id="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>

  <section class="hero">
    <div class="container">
      <h1>Hi, I'm CHAN</h1>
      <p class="hero-subtitle" id="typewriter"></p>
    </div>
  </section>

  <section class="skills">
    <h2>Skills</h2>
    <div class="skills-divider"></div>
    <div class="skills-grid">
      <div class="skill-card" style="--accent: #f97316; --accent-glow: rgba(249, 115, 22, 0.25);">HTML / CSS</div>
      <div class="skill-card" style="--accent: #eab308; --accent-glow: rgba(234, 179, 8, 0.25);">JavaScript</div>
      <div class="skill-card" style="--accent: #3b82f6; --accent-glow: rgba(59, 130, 246, 0.25);">React</div>
      <div class="skill-card" style="--accent: #6366f1; --accent-glow: rgba(99, 102, 241, 0.25);">Python</div>
      <div class="skill-card" style="--accent: #22c55e; --accent-glow: rgba(34, 197, 94, 0.25);">Node.js</div>
      <div class="skill-card" style="--accent: #ec4899; --accent-glow: rgba(236, 72, 153, 0.25);">Figma</div>
    </div>
  </section>

  <section class="projects">
    <h2>Projects</h2>
    <div class="projects-divider"></div>
    <div class="projects-grid">
      <div class="project-card">
        <img src="https://picsum.photos/400/250?random=1" alt="Project Alpha" loading="lazy">
        <div class="project-info">
          <h3>Project Alpha</h3>
          <p>一款极简风格的任务管理应用，支持拖拽排序和实时协作。</p>
        </div>
      </div>
      <div class="project-card">
        <img src="https://picsum.photos/400/250?random=2" alt="Project Beta" loading="lazy">
        <div class="project-info">
          <h3>Project Beta</h3>
          <p>基于 AI 的智能内容生成平台，帮助创作者快速产出优质文案。</p>
        </div>
      </div>
      <div class="project-card">
        <img src="https://picsum.photos/400/250?random=3" alt="Project Gamma" loading="lazy">
        <div class="project-info">
          <h3>Project Gamma</h3>
          <p>数据可视化仪表盘，将复杂业务指标转化为直观易懂的图表。</p>
        </div>
      </div>
    </div>
  </section>

  <section class="contact" id="contact">
    <h2>Contact</h2>
    <div class="contact-divider"></div>
    <div class="contact-card">
      <div class="contact-item">
        <span class="icon">👤</span>
        <span>李艳婷（鸽鸽）</span>
      </div>
      <div class="contact-item">
        <span class="icon">📞</span>
        <span>131066***367</span>
      </div>
    </div>
  </section>

  <footer>
    <p>&copy; 2025 CHAN</p>
  </footer>

  <div class="spotlight-overlay" id="spotlightOverlay">
    <div class="magnifier-glass">
      <div class="magnifier-content">
        <div class="contact-item">
          <span class="icon">👤</span>
          <span>李艳婷（鸽鸽）</span>
        </div>
        <div class="contact-item">
          <span class="icon">📞</span>
          <span>131066***367</span>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <img class="modal-img" src="come-hit-me.png" alt="来打我呀">
  </div>

  <div class="ktv-overlay" id="ktvOverlay"></div>

  <script>
    (function() {
      const particles = document.getElementById('particles');
      let targetX = 0, targetY = 0;
      let currentX = 0, currentY = 0;

      document.addEventListener('mousemove', function(e) {
        const cx = window.innerWidth / 2;
        const cy = window.innerHeight / 2;
        targetX = (e.clientX - cx) / cx * -30;
        targetY = (e.clientY - cy) / cy * -20;
      });

      function animate() {
        currentX += (targetX - currentX) * 0.05;
        currentY += (targetY - currentY) * 0.05;
        particles.style.transform = 'translate(' + currentX + 'px, ' + currentY + 'px)';
        requestAnimationFrame(animate);
      }
      animate();

      // Typewriter effect
      const typewriter = document.getElementById('typewriter');
      const text = '我是谁？我是AI世界虚拟人的天花板，现实中的菜鸟。不服请打李艳婷。';
      let i = 0;
      const speed = 90;

      function type() {
        if (i < text.length) {
          typewriter.innerHTML = text.substring(0, i + 1) + '<span class="cursor"></span>';
          i++;
          setTimeout(type, speed);
        } else {
          typewriter.innerHTML = text + '<span class="cursor"></span>';
          setTimeout(function() {
            const cursor = typewriter.querySelector('.cursor');
            if (cursor) cursor.style.display = 'none';
          }, 2500);
        }
      }

      setTimeout(type, 1200);

      // Nav button: scroll to contact, magnifier spotlight, then modal + ktv
      const navBtn = document.getElementById('navBtn');
      const modalOverlay = document.getElementById('modalOverlay');
      const spotlightOverlay = document.getElementById('spotlightOverlay');
      const ktvOverlay = document.getElementById('ktvOverlay');

      // Danmaku hint
      const navBtnRect = navBtn.getBoundingClientRect();
      const targetLeft = navBtnRect.left + navBtnRect.width / 2;

      function spawnDanmaku() {
        const el = document.createElement('div');
        el.className = 'danmaku';
        el.textContent = '👈 点这里';
        const size = 0.85 + Math.random() * 0.9;
        el.style.fontSize = size + 'rem';
        const top = 25 + Math.random() * 100;
        el.style.top = top + 'px';
        el.style.right = '-160px';
        const flyDist = -(window.innerWidth - targetLeft + 100) + 'px';
        el.style.setProperty('--fly-distance', flyDist);
        document.body.appendChild(el);
        setTimeout(function() { el.remove(); }, 2500);
      }

      const danmakuInterval = setInterval(spawnDanmaku, 650);
      spawnDanmaku();

      navBtn.addEventListener('click', function(e) {
        e.preventDefault();
        clearInterval(danmakuInterval);
        document.querySelectorAll('.danmaku').forEach(function(d) { d.remove(); });
        document.getElementById('contact').scrollIntoView({ behavior: 'smooth' });
        setTimeout(function() {
          spotlightOverlay.classList.add('active');
          setTimeout(function() {
            spotlightOverlay.classList.remove('active');
            modalOverlay.classList.add('active');
            ktvOverlay.classList.add('active');
          }, 3000);
        }, 700);
      });

      modalOverlay.addEventListener('click', function() {
        modalOverlay.classList.remove('active');
        ktvOverlay.classList.remove('active');
      });
    })();
  </script>
</body>
</html>
