<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Vibe Site</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      min-height: 100%;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #312e81 100%);
      background-attachment: fixed;
      color: #f8fafc;
      text-align: center;
      overflow-x: hidden;
    }

    .particles {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      transition: transform 0.8s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      filter: blur(40px);
      opacity: 0;
      animation: float ease-in-out infinite;
    }

    .particle:nth-child(1) {
      width: 280px; height: 280px;
      background: radial-gradient(circle, rgba(167, 100, 255, 0.45) 0%, transparent 70%);
      top: 8%; left: 12%;
      animation-duration: 14s;
      animation-delay: 0s;
    }
    .particle:nth-child(2) {
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(80, 220, 255, 0.40) 0%, transparent 70%);
      top: 65%; left: 8%;
      animation-duration: 18s;
      animation-delay: 2s;
    }
    .particle:nth-child(3) {
      width: 240px; height: 240px;
      background: radial-gradient(circle, rgba(255, 130, 200, 0.40) 0%, transparent 70%);
      top: 20%; right: 10%;
      animation-duration: 16s;
      animation-delay: 4s;
    }
    .particle:nth-child(4) {
      width: 180px; height: 180px;
      background: radial-gradient(circle, rgba(167, 100, 255, 0.38) 0%, transparent 70%);
      top: 75%; right: 15%;
      animation-duration: 12s;
      animation-delay: 1s;
    }
    .particle:nth-child(5) {
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(80, 220, 255, 0.35) 0%, transparent 70%);
      top: 45%; left: 25%;
      animation-duration: 20s;
      animation-delay: 3s;
    }
    .particle:nth-child(6) {
      width: 160px; height: 160px;
      background: radial-gradient(circle, rgba(255, 130, 200, 0.42) 0%, transparent 70%);
      top: 5%; left: 55%;
      animation-duration: 15s;
      animation-delay: 5s;
    }
    .particle:nth-child(7) {
      width: 220px; height: 220px;
      background: radial-gradient(circle, rgba(167, 100, 255, 0.40) 0%, transparent 70%);
      top: 55%; right: 25%;
      animation-duration: 17s;
      animation-delay: 6s;
    }
    .particle:nth-child(8) {
      width: 190px; height: 190px;
      background: radial-gradient(circle, rgba(80, 220, 255, 0.42) 0%, transparent 70%);
      top: 30%; left: 5%;
      animation-duration: 13s;
      animation-delay: 2.5s;
    }
    .particle:nth-child(9) {
      width: 260px; height: 260px;
      background: radial-gradient(circle, rgba(255, 130, 200, 0.35) 0%, transparent 70%);
      top: 85%; left: 45%;
      animation-duration: 19s;
      animation-delay: 1.5s;
    }
    .particle:nth-child(10) {
      width: 170px; height: 170px;
      background: radial-gradient(circle, rgba(167, 100, 255, 0.38) 0%, transparent 70%);
      top: 40%; right: 5%;
      animation-duration: 14s;
      animation-delay: 4.5s;
    }
    .particle:nth-child(11) {
      width: 230px; height: 230px;
      background: radial-gradient(circle, rgba(80, 220, 255, 0.32) 0%, transparent 70%);
      top: 15%; left: 35%;
      animation-duration: 16s;
      animation-delay: 3.5s;
    }
    .particle:nth-child(12) {
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(255, 130, 200, 0.38) 0%, transparent 70%);
      top: 60%; left: 60%;
      animation-duration: 18s;
      animation-delay: 0.5s;
    }

    @keyframes float {
      0%, 100% {
        opacity: 0;
        transform: translateY(0) scale(1);
      }
      20% {
        opacity: 1;
      }
      50% {
        transform: translateY(-30px) scale(1.05);
      }
      80% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translateY(0) scale(1);
      }
    }

    .hero {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      max-width: 800px;
      padding: 2rem;
    }

    h1 {
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 1rem;
      background: linear-gradient(90deg, #e2e8f0 0%, #c7d2fe 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      opacity: 0;
      transform: translateY(30px);
      animation: fadeInUp 1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    p {
      font-size: clamp(1rem, 2.5vw, 1.35rem);
      font-weight: 400;
      color: #94a3b8;
      line-height: 1.6;
      max-width: 600px;
      margin: 0 auto;
      opacity: 0;
      transform: translateY(30px);
      animation: fadeInUp 1s cubic-bezier(0.22, 1, 0.36, 1) 0.5s forwards;
    }

    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .skills {
      position: relative;
      z-index: 1;
      padding: 100px 2rem 120px;
    }

    .skills h2 {
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 800;
      color: #f8fafc;
      margin-bottom: 1rem;
      letter-spacing: -0.02em;
    }

    .skills-divider {
      width: 60px;
      height: 3px;
      margin: 0 auto 3.5rem;
      border-radius: 2px;
      background: linear-gradient(90deg, #a764ff, #50dcff, #ff82c8);
    }

    .skills-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      max-width: 800px;
      margin: 0 auto;
    }

    .skill-card {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--accent);
      border-radius: 16px;
      padding: 2rem 1rem;
      font-size: 1.1rem;
      font-weight: 600;
      color: #f8fafc;
      transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
      cursor: default;
    }

    .skill-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.3), 0 0 24px var(--accent-glow);
      background: rgba(255, 255, 255, 0.07);
    }

    @media (max-width: 640px) {
      .skills-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <div class="particles" id="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>

  <section class="hero">
    <div class="container">
      <h1>Hi, I'm CHAN</h1>
      <p>全栈开发者 / 产品设计师，热爱用代码构建优雅且有人情味的产品体验。</p>
    </div>
  </section>

  <section class="skills">
    <h2>Skills</h2>
    <div class="skills-divider"></div>
    <div class="skills-grid">
      <div class="skill-card" style="--accent: #f97316; --accent-glow: rgba(249, 115, 22, 0.25);">HTML / CSS</div>
      <div class="skill-card" style="--accent: #eab308; --accent-glow: rgba(234, 179, 8, 0.25);">JavaScript</div>
      <div class="skill-card" style="--accent: #3b82f6; --accent-glow: rgba(59, 130, 246, 0.25);">React</div>
      <div class="skill-card" style="--accent: #6366f1; --accent-glow: rgba(99, 102, 241, 0.25);">Python</div>
      <div class="skill-card" style="--accent: #22c55e; --accent-glow: rgba(34, 197, 94, 0.25);">Node.js</div>
      <div class="skill-card" style="--accent: #ec4899; --accent-glow: rgba(236, 72, 153, 0.25);">Figma</div>
    </div>
  </section>

  <script>
    (function() {
      const particles = document.getElementById('particles');
      let targetX = 0, targetY = 0;
      let currentX = 0, currentY = 0;

      document.addEventListener('mousemove', function(e) {
        const cx = window.innerWidth / 2;
        const cy = window.innerHeight / 2;
        targetX = (e.clientX - cx) / cx * -30;
        targetY = (e.clientY - cy) / cy * -20;
      });

      function animate() {
        currentX += (targetX - currentX) * 0.05;
        currentY += (targetY - currentY) * 0.05;
        particles.style.transform = 'translate(' + currentX + 'px, ' + currentY + 'px)';
        requestAnimationFrame(animate);
      }
      animate();
    })();
  </script>
</body>
</html>
